<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇游戏</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier', monospace;
            box-sizing: border-box;
        }
        h1 {
            color: white;
            margin-bottom: 15px;
            font-size: 24px;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
        }
        #gameCanvas {
            border: 2px solid white;
            background-color: black;
            width: 100%;
            height: auto;
            aspect-ratio: 1/1;
        }
        #scoreBoard {
            color: white;
            font-size: 18px;
            margin-top: 10px;
            text-align: center;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            display: none;
        }
        #controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
            width: 100%;
            max-width: 300px;
            height: 300px;
        }
        .control-btn {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .control-btn:active {
            background-color: rgba(255, 255, 255, 0.4);
        }
        #up {
            grid-row: 1;
            grid-column: 2;
        }
        #left {
            grid-row: 2;
            grid-column: 1;
        }
        #down {
            grid-row: 3;
            grid-column: 2;
        }
        #right {
            grid-row: 2;
            grid-column: 3;
        }
        @media (max-width: 600px) {
            #controls {
                display: grid;
            }
        }
    </style>
</head>
<body>
    <h1>贪吃蛇游戏</h1>
    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div id="gameOver"></div>
    </div>
    <div id="scoreBoard">得分: 0 食物: 0/6</div>
    <div id="controls">
        <button class="control-btn" id="up">↑</button>
        <button class="control-btn" id="left">←</button>
        <button class="control-btn" id="down">↓</button>
        <button class="control-btn" id="right">→</button>
    </div>
    <script>
        // 获取画布和上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreBoard = document.getElementById('scoreBoard');
        const gameOver = document.getElementById('gameOver');
        
        // 游戏参数
        const gridSize = 20; // 网格大小
        const canvasWidth = canvas.width;
        const canvasHeight = canvas.height;
        
        // 蛇的初始位置和方向
        let snake = [
            { x: 300, y: 300 }, // 蛇头
        ];
        let direction = 'stop'; // 初始方向
        
        // 食物位置
        let food = { x: 300, y: 200 };
        
        // 游戏状态
        let score = 0;
        let foodEaten = 0;
        const winFoodCount = 6;
        let gameWin = false;
        let gameRunning = true;
        
        // 键盘事件监听
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                    if (direction !== 'down') direction = 'up';
                    break;
                case 'ArrowDown':
                    if (direction !== 'up') direction = 'down';
                    break;
                case 'ArrowLeft':
                    if (direction !== 'right') direction = 'left';
                    break;
                case 'ArrowRight':
                    if (direction !== 'left') direction = 'right';
                    break;
            }
        });
        
        // 触摸控制按钮事件监听
        document.getElementById('up').addEventListener('click', () => {
            if (direction !== 'down') direction = 'up';
        });
        document.getElementById('down').addEventListener('click', () => {
            if (direction !== 'up') direction = 'down';
        });
        document.getElementById('left').addEventListener('click', () => {
            if (direction !== 'right') direction = 'left';
        });
        document.getElementById('right').addEventListener('click', () => {
            if (direction !== 'left') direction = 'right';
        });
        
        // 生成随机食物位置
        function generateFood() {
            // 确保食物位置是网格大小的倍数，并且不在蛇身上
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * (canvasWidth / gridSize)) * gridSize,
                    y: Math.floor(Math.random() * (canvasHeight / gridSize)) * gridSize
                };
            } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
            food = newFood;
        }
        
        // 绘制蛇
        function drawSnake() {
            ctx.fillStyle = 'white';
            snake.forEach(segment => {
                ctx.fillRect(segment.x, segment.y, gridSize, gridSize);
            });
        }
        
        // 绘制食物
        function drawFood() {
            ctx.fillStyle = 'red';
            ctx.beginPath();
            ctx.arc(food.x + gridSize/2, food.y + gridSize/2, gridSize/2, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // 更新游戏状态
        function update() {
            if (!gameRunning) return;
            
            // 移动蛇头
            const head = { ...snake[0] };
            switch(direction) {
                case 'up':
                    head.y -= gridSize;
                    break;
                case 'down':
                    head.y += gridSize;
                    break;
                case 'left':
                    head.x -= gridSize;
                    break;
                case 'right':
                    head.x += gridSize;
                    break;
            }
            
            // 将新蛇头添加到蛇的前面
            snake.unshift(head);
            
            // 检测是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                foodEaten += 1;
                scoreBoard.textContent = `得分: ${score} 食物: ${foodEaten}/${winFoodCount}`;
                generateFood();
                
                // 检查是否通关
                if (foodEaten >= winFoodCount) {
                    gameWin = true;
                    gameRunning = false;
                    gameOver.textContent = '恭喜通关!';
                    gameOver.style.display = 'block';
                    return;
                }
            } else {
                // 如果没吃到食物，移除蛇尾
                snake.pop();
            }
            
            // 检测碰撞到边界
            if (head.x < 0 || head.x >= canvasWidth || head.y < 0 || head.y >= canvasHeight) {
                gameRunning = false;
                gameOver.textContent = '游戏结束!';
                gameOver.style.display = 'block';
                return;
            }
            
            // 检测碰撞到自己（从第二个身体部分开始检测）
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameRunning = false;
                    gameOver.textContent = '游戏结束!';
                    gameOver.style.display = 'block';
                    return;
                }
            }
        }
        
        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            
            // 绘制蛇和食物
            drawSnake();
            drawFood();
        }
        
        // 游戏循环
        function gameLoop() {
            update();
            draw();
            if (gameRunning) {
                setTimeout(gameLoop, 100); // 控制游戏速度
            }
        }
        
        // 初始化游戏
        function init() {
            generateFood();
            gameLoop();
        }
        
        // 启动游戏
        init();
    </script>
</body>
</html>
